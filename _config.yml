title: 我的Jekyll博客
description: 用Jekyll和GitHub Pages搭建的个人网站
author: zhiwei121
email: your-email@example.com

# 博客设置
permalink: /blog/:year/:month/:day/:title/

# 构建设置
markdown: kramdown

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
    values:
      layout: "default"

plugins:
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
